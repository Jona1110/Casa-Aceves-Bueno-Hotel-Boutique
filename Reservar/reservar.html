<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar | Casa Aceves & Bueno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Rutas relativas correctas según tu estructura -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="reservar.css">
</head>
<body>

    <header class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="logo">
                <span class="logo-title">CASA ACEVES & BUENO</span>
                <span class="logo-subtitle">HOTEL BOUTIQUE</span>
            </a>
            <nav class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Inicio</a>
                <a href="../Habitaciones/habitaciones.html" class="nav-link">Habitaciones</a>
                <a href="../Servicios/servicios.html" class="nav-link">Servicios</a>
                <a href="../Nosotros/nosotros.html" class="nav-link">Nosotros</a>
                <a href="../Contacto/contacto.html" class="nav-link">Contacto</a>
                <a href="reservar.html" class="nav-link active btn-reservar">Reservar</a>
            </nav>
            <div class="hamburger" id="hamburgerMenu">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <div class="page-header reveal">
                <h1 class="page-title">Solicita tu Reserva</h1>
                <p class="page-desc">Completa el formulario para consultar disponibilidad y asegurar tu estancia en la casa 415.</p>
                <div class="divider"></div>
            </div>

            <div class="contact-form-wrapper reveal">
                <form id="reservaForm" class="contact-form">
                    <div class="input-group">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" required placeholder="Tu nombre">
                    </div>
                    
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" required placeholder="tu@email.com">
                    </div>

                    <div class="input-group">
                        <label for="phone">Teléfono</label>
                        <input type="tel" id="phone" required placeholder="33 1234 5678">
                    </div>

                    <div class="input-group">
                        <label for="room">Selecciona tu Suite</label>
                        <select id="room" required>
                            <option value="">Cargando habitaciones...</option>
                        </select>
                    </div>

                    <div class="date-group" style="display: flex; gap: 20px;">
                        <div class="input-group" style="flex: 1;">
                            <label for="checkIn">Fecha Entrada</label>
                            <input type="date" id="checkIn" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label for="checkOut">Fecha Salida</label>
                            <input type="date" id="checkOut" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="guests">Cantidad de Huéspedes</label>
                        <input type="number" id="guests" min="1" max="6" required>
                    </div>

                    <div class="deposit-box">
                        <label>Anticipo requerido (50%):</label>
                        <input type="text" id="depositDisplay" readonly placeholder="$0.00 MXN">
                    </div>

                    <button type="submit" class="btn-primary w-100">Solicitar Reserva</button>
                    <div id="formStatus" class="form-status"></div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <!-- El footer global que usas en tus otras páginas -->
    </footer>

    <!-- Rutas relativas a los scripts -->
    <script src="../script.js"></script>
    <script src="reservar.js"></script>
</body>
</html>
